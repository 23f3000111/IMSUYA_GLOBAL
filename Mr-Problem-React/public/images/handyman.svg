<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="270" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.4" fill="rgba(255,255,255,0.2)"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <ellipse cx="400" cy="270" rx="320" ry="260" fill="url(#glow)"/>

  <!-- Decorative rings -->
  <circle cx="400" cy="270" r="210" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="400" cy="270" r="155" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Icon backdrop circle -->
  <circle cx="400" cy="270" r="105" fill="rgba(255,255,255,0.13)" filter="url(#shadow)"/>

  <!-- Wrench icon (Lucide, 24×24 viewbox → 9× scale, centered at 400,270) -->
  <g transform="translate(400 270) scale(9) translate(-12 -12)"
     fill="none" stroke="white" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
  </g>

  <!-- Sparkle top-right accent -->
  <g transform="translate(618 100) scale(4.5) translate(-12 -12)"
     fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.55)"
     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
  </g>

  <!-- Sparkle bottom-left accent -->
  <g transform="translate(148 440) scale(3) translate(-12 -12)"
     fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.35)"
     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
  </g>

  <!-- Small floating dot accents -->
  <circle cx="155" cy="150" r="5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="648" cy="420" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="90" cy="340" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="700" cy="210" r="3.5" fill="rgba(255,255,255,0.22)"/>

  <!-- Bottom label bar -->
  <rect x="0" y="512" width="800" height="88" fill="rgba(0,0,0,0.26)"/>
  <text x="400" y="558" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="22" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="3">
    HANDYMAN SERVICES
  </text>
  <text x="400" y="585" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="14" fill="rgba(255,255,255,0.58)" letter-spacing="1.5">
    Assembly · Repair · Installation
  </text>
</svg>
