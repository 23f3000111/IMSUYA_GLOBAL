<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="270" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.4" fill="rgba(255,255,255,0.18)"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <ellipse cx="400" cy="270" rx="320" ry="260" fill="url(#glow)"/>

  <!-- Decorative rings -->
  <circle cx="400" cy="270" r="210" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="400" cy="270" r="155" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Icon backdrop circle -->
  <circle cx="400" cy="270" r="105" fill="rgba(255,255,255,0.12)" filter="url(#shadow)"/>

  <!-- Building2 icon (Lucide, 24×24 → 9× scale, centered at 400,270) -->
  <g transform="translate(400 270) scale(9) translate(-12 -12)"
     fill="none" stroke="white" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/>
    <path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/>
    <path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/>
    <path d="M10 6h4"/>
    <path d="M10 10h4"/>
    <path d="M10 14h4"/>
    <path d="M10 18h4"/>
  </g>

  <!-- Large sparkle top-right -->
  <g transform="translate(618 95) scale(5) translate(-12 -12)"
     fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)"
     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
  </g>

  <!-- Small sparkle bottom-left -->
  <g transform="translate(148 445) scale(3.2) translate(-12 -12)"
     fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.38)"
     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
    <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
  </g>

  <!-- Tiny sparkle upper-left -->
  <g transform="translate(178 140) scale(2.5) translate(-12 -12)"
     fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)"
     stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
  </g>

  <!-- Floating dot accents -->
  <circle cx="155" cy="160" r="5" fill="rgba(255,255,255,0.28)"/>
  <circle cx="648" cy="430" r="4" fill="rgba(255,255,255,0.22)"/>
  <circle cx="92" cy="340" r="3" fill="rgba(255,255,255,0.18)"/>
  <circle cx="700" cy="200" r="3.5" fill="rgba(255,255,255,0.2)"/>

  <!-- Bottom label bar -->
  <rect x="0" y="512" width="800" height="88" fill="rgba(0,0,0,0.26)"/>
  <text x="400" y="558" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="22" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="3">
    OFFICE CLEANING
  </text>
  <text x="400" y="585" text-anchor="middle"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="14" fill="rgba(255,255,255,0.58)" letter-spacing="1.5">
    Professional · Consistent · Discreet
  </text>
</svg>
